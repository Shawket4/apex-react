name: Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  build-and-release:
    name: Build Desktop & Release
    runs-on: ${{ matrix.platform }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-latest" # Apple Silicon Mac
            target: "aarch64-apple-darwin"
          - platform: "macos-latest" # Intel Mac
            target: "x86_64-apple-darwin"
          - platform: "ubuntu-22.04" # Linux (AppImage & deb)
            target: "x86_64-unknown-linux-gnu"
          - platform: "windows-latest" # Windows (msi & exe)
            target: "x86_64-pc-windows-msvc"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # Tauri v2 requires specific WebKit dependencies on Linux
      - name: Install Ubuntu dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install NPM dependencies
        run: npm install

      # This action automatically builds the app and attaches the
      # installers (.dmg, .app, .exe, .msi, .AppImage, .deb) to the GitHub release.
      #
      # macOS signing: APPLE_SIGNING_IDENTITY="-" produces an ad-hoc signature
      # so the app appears in Privacy & Security → "Open Anyway". For proper
      # distribution, replace with a Developer ID certificate + notarization:
      #   APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
      #   APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
      #   APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
      #   APPLE_ID: ${{ secrets.APPLE_ID }}
      #   APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
      #   APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      - name: Build and Upload Release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_SIGNING_IDENTITY: "-"
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Apex Fleet ${{ github.ref_name }}"
          releaseBody: "Automated release generated by GitHub Actions."
          releaseDraft: false
          prerelease: false
          args: --target ${{ matrix.target }}

  build-android:
    name: Build Android APK
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r26b
          local-cache: false

      - name: Install NPM dependencies
        run: npm install

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > src-tauri/gen/android/app/release.keystore

      - name: Create key.properties
        run: |
          cat > src-tauri/gen/android/key.properties <<EOF
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=release.keystore
          EOF

      - name: Build Android APK
        env:
          NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: npm run tauri android build -- --apk

      # Creates the release if it doesn't exist yet, or appends the APK
      # if the desktop jobs already created it — safe for parallel execution.
      - name: Upload APK to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Apex Fleet ${{ github.ref_name }}"
          body: "Automated release generated by GitHub Actions."
          files: src-tauri/gen/android/app/build/outputs/apk/**/*.apk
